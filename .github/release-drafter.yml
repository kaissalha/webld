name-template: "v$RESOLVED_VERSION ✨"
tag-template: "v$RESOLVED_VERSION"
categories:
    - title: "🚀 Features"
      labels:
          - "feature"
          - "enhancement"
    - title: "🐛 Bug Fixes"
      labels:
          - "bug"
    - title: "🧰 Maintenance"
      label: "chore"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.
version-resolver:
    major:
        labels:
            - "major"
    minor:
        labels:
            - "feature"
    patch:
        labels:
            - "fix"
    default: patch
autolabeler:
    - label: "chore"
      title:
          - "/^chore/i"
    - label: "bug"
      title:
          - "/^fix/i"
    - label: "feature"
      title:
          - "/^feature/i"
          - "/^feat/i"
footer: |
    ---
     🏁 **Note:** Some features may be hidden behind feature flags, review active feature flags [here](https://us.posthog.com/project/162192/feature_flags)
template: |
    ## Changes

    $CHANGES

    **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

    --

    ## Contributors

    $CONTRIBUTORS
